<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <nav>
    <a href="../../index.html" data-i18n="back">← 목록으로</a>
    <button id="lang-btn" class="lang-btn">EN</button>
  </nav>

  <div class="top">
    <h1>2048</h1>
    <div class="scores">
      <div class="score-box">
        <div class="label" data-i18n="score_label">점수</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="label" data-i18n="best_label">최고</div>
        <div class="value" id="best">0</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <span class="hint" data-i18n="hint">방향키 또는 스와이프로 조작</span>
    <button id="btn-new" data-i18n="btn_new">새 게임</button>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="overlay" id="overlay">
      <h2 id="overlay-msg"></h2>
      <button id="btn-overlay"></button>
    </div>
  </div>

  <script src="./js/game.js"></script>
</body>
</html>
