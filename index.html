<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Games</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <header>
    <button id="lang-btn" class="lang-btn">EN</button>
    <h1>🎮 <span data-i18n="site_title">3분 Games</span></h1>
    <p data-i18n="site_desc">미니 게임 모음</p>
  </header>

  <main>
    <div class="game-grid">
      <a href="./games/2048/" class="game-card">
        <div class="icon">🔢</div>
        <h2>2048</h2>
        <p data-i18n="game_2048_desc">타일을 합쳐 2048을 만들어보세요</p>
        <span class="badge">Vanilla JS</span>
      </a>

      <a href="./games/tower/" class="game-card">
        <div class="icon">⚔️</div>
        <h2 data-i18n="game_tower_title">구름탑 검사단</h2>
        <p data-i18n="game_tower_desc">탑을 오르며 적을 처치하세요</p>
        <span class="badge">Vanilla JS</span>
      </a>
    </div>
  </main>

  <script src="./js/main.js"></script>
</body>
</html>
